services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hackbase-backend
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV in .env}
      BACKEND_HOST: ${BACKEND_HOST:?Set BACKEND_HOST in .env}
      BACKEND_PORT: ${BACKEND_PORT:?Set BACKEND_PORT in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in .env}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in .env}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:?Set SUPABASE_PUBLISHABLE_KEY in .env}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:?Set SUPABASE_SECRET_KEY in .env}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:?Set SUPABASE_JWKS_URL in .env}
    ports:
      - "8787:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + process.env.BACKEND_PORT + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env}
        VITE_WS_URL: ${VITE_WS_URL:?Set VITE_WS_URL in .env}
    container_name: hackbase-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
