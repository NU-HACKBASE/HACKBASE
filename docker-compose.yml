services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hackbase-backend
    environment:
      APP_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8787
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://hackbase:hackbase@postgres:5432/hackbase
      REDIS_URL: redis://redis:6379
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8787/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8787
        VITE_WS_URL: ws://localhost:8787/ws
    container_name: hackbase-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: hackbase-postgres
    environment:
      POSTGRES_USER: hackbase
      POSTGRES_PASSWORD: hackbase
      POSTGRES_DB: hackbase
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackbase -d hackbase"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hackbase-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
