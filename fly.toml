# Fly.io backend deployment config.
# Change `app` after creating the real Fly app if this name is unavailable.
app = "hackbase-backend"
primary_region = "nrt"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_ENV = "production"
  BACKEND_HOST = "0.0.0.0"
  BACKEND_PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
